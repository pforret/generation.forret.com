# Zensical counterpart of static/mkdocs.yml — same settings, TOML format.
# Markdown under docs/ is generated by `php artisan static:generate` — do not hand-edit the
# generated trees (generations/, people/, events/, compare/, born-in/, quotes/,
# what-generation-am-i/, img/). Hand-authored content: about/, icon/, overrides/.

[project]
site_name = "Generations Explained"
site_url = "https://generation.forret.com/"
site_description = "A consolidated reference to the human generations from the Lost Generation to Generation Alpha: birth-year ranges, notable people, quotes and defining events."
copyright = "&copy; 2026 generation.forret.com &bull; pforret"

[project.theme]
name = "material"
custom_dir = "docs/overrides"
logo = "icon/android-chrome-192x192.png"
favicon = "icon/android-chrome-192x192.png"
features = [
  "content.code.copy",
  "header.autohide",
  "navigation.instant",
  "navigation.integrate",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.integrate",
]

[[project.theme.palette]]
primary = "red"

[project.theme.font]
text = "Nunito"

[project.markdown.extensions]
admonition = {}
abbr = {}
attr_list = {}
def_list = {}
footnotes = {}
md_in_html = {}

[project.markdown.extensions.toc]
permalink = true

[project.markdown.extensions."pymdownx.caret"]
[project.markdown.extensions."pymdownx.critic"]
[project.markdown.extensions."pymdownx.details"]
[project.markdown.extensions."pymdownx.keys"]
[project.markdown.extensions."pymdownx.mark"]
[project.markdown.extensions."pymdownx.snippets"]
[project.markdown.extensions."pymdownx.tilde"]

[project.markdown.extensions."pymdownx.tabbed"]
alternate_style = true

[project.markdown.extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.markdown.extensions."pymdownx.emoji"]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[project.markdown.extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.plugins.search]

[project.plugins.awesome-pages]

# Optional: 301-redirect old Laravel URLs + slug aliases to the new canonical URLs.
# [project.plugins.redirects.redirect_maps]
# "generation/x.md" = "generations/generation-x/index.md"
# "person/keanu-reeves.md" = "people/keanu-reeves.md"
# "generations/boomers.md" = "generations/baby-boomers/index.md"
# "generations/gen-x.md" = "generations/generation-x/index.md"
# "generations/generation-y.md" = "generations/millennials/index.md"
# "generations/gen-z.md" = "generations/generation-z/index.md"

[project.extra]
generator = false

# Use the "custom" analytics provider so the theme includes
# overrides/partials/integrations/analytics/custom.html (Simple Analytics) on every page.
[project.extra.analytics]
provider = "custom"
